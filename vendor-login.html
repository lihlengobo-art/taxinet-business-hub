<!DOCTYPE html>

<html>

<head>

```
<title>Taxinet Connect Vendor Portal</title>

<style>

    body {
        font-family: Arial, sans-serif;
        background: white;
        color: #0B3D91;
        text-align: center;
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    .logo {
        width: 300px;
        margin-top: 30px;
        margin-bottom: 20px;
    }

    .card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin-top: 20px;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.15);
    }

    h1, h2 {
        color: #0B3D91;
    }

    input {
        width: 300px;
        padding: 12px;
        margin: 8px;
        border: 2px solid #0B3D91;
        border-radius: 5px;
    }

    button {
        background: #0B3D91;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        opacity: 0.9;
    }

    .divider {
        margin: 40px 0;
    }

</style>
```

</head>

<body>

```
<img
    src="images/Taxinet LOGO.jpg"
    class="logo"
    alt="Taxinet Logo">

<h1>Taxinet Connect Vendor Portal</h1>

<p>
    Register your business and access the Taxinet Business Hub.
</p>

<div class="card">

    <h2>Vendor Registration</h2>

    <input
        id="fullName"
        placeholder="Full Name">

    <br>

    <input
        id="businessName"
        placeholder="Business Name">

    <br>

    <input
        id="phone"
        placeholder="Phone Number">

    <br>

    <input
        id="email"
        type="email"
        placeholder="Email Address">

    <br>

    <input
        id="password"
        type="password"
        placeholder="Password">

    <br>

    <button onclick="registerVendor()">
        Register
    </button>

</div>

<div class="divider">
    <hr>
</div>

<div class="card">

    <h2>Vendor Login</h2>

    <input
        id="loginEmail"
        type="email"
        placeholder="Email Address">

    <br>

    <input
        id="loginPassword"
        type="password"
        placeholder="Password">

    <br>

    <button onclick="loginVendor()">
        Login
    </button>

</div>
```

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_PROJECT.firebaseapp.com",

    projectId: "YOUR_PROJECT_ID",

    storageBucket: "YOUR_PROJECT.appspot.com",

    messagingSenderId: "YOUR_SENDER_ID",

    appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

window.registerVendor = async function() {

    try {

        let fullName =
            document.getElementById("fullName").value;

        let businessName =
            document.getElementById("businessName").value;

        let phone =
            document.getElementById("phone").value;

        let email =
            document.getElementById("email").value;

        let password =
            document.getElementById("password").value;

        const userCredential =
            await createUserWithEmailAndPassword(
                auth,
                email,
                password
            );

        await addDoc(
            collection(db, "vendors"),
            {
                userId:
                    userCredential.user.uid,

                fullName:
                    fullName,

                businessName:
                    businessName,

                phone:
                    phone,

                email:
                    email,

                status:
                    "Pending"
            }
        );

        alert(
            "Registration submitted. Await approval from Taxinet Connect."
        );

    }

    catch(error) {

        alert(error.message);

    }

};

window.loginVendor = async function() {

    try {

        let email =
            document.getElementById("loginEmail").value;

        let password =
            document.getElementById("loginPassword").value;

        const userCredential =
            await signInWithEmailAndPassword(
                auth,
                email,
                password
            );

        let uid =
            userCredential.user.uid;

        let approved = false;

        const snapshot =
            await getDocs(
                collection(db, "vendors")
            );

        snapshot.forEach(doc => {

            let vendor =
                doc.data();

            if (
                vendor.userId === uid &&
                vendor.status === "Approved"
            ) {

                approved = true;

                localStorage.setItem(
                    "taxinetUser",
                    JSON.stringify(vendor)
                );

            }

        });

        if (!approved) {

            alert(
                "Your account is still awaiting approval."
            );

            return;

        }

        window.location.href =
            "businesshub.html";

    }

    catch(error) {

        alert(error.message);

    }

};

</script>

</body>

</html>
